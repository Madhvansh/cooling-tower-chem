site_name: cooling-tower-chem
site_description: Water-stability and corrosion indices for cooling towers
site_url: https://madhvansh.github.io/cooling-tower-chem/
repo_url: https://github.com/Madhvansh/cooling-tower-chem
repo_name: Madhvansh/cooling-tower-chem
copyright: Copyright &copy; 2026 Madhvansh Choksi — MIT License

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Indices & the science: indices.md
  - Command line: cli.md
  - API reference: api.md
